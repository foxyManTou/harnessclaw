name: Claim Issue Reward V2

on:
  issues:
    types:
      - closed

concurrency:
  group: claim-issue-reward-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claim-issue-reward:
    if: contains(github.event.issue.labels.*.name, 'reward')
    runs-on: ubuntu-latest
    steps:
      - name: Print minimal diagnostics
        run: |
          echo "issue_number=${{ github.event.issue.number }}"
          echo "issue_title=${{ github.event.issue.title }}"
          echo "issue_labels=${{ join(github.event.issue.labels.*.name, ', ') }}"
          echo "repository=${{ github.repository }}"
